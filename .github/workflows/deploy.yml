name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build → Push ECR → Deploy EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/aifi
            git pull origin main
            cd /home/ubuntu/aifi/apps/api && npm ci --omit=dev
            cd /home/ubuntu/aifi/apps/worker && npm ci --omit=dev
            cd /home/ubuntu/aifi/apps/web && npm ci
            cd /home/ubuntu/aifi/apps/web && VITE_API_URL=https://docmind.space ./node_modules/.bin/vite build
            sudo systemctl reload nginx
            cd /home/ubuntu/aifi && pm2 reload aifi-api --update-env
            cd /home/ubuntu/aifi && pm2 reload aifi-worker --update-env
            echo "✅ Deployment successful!"
