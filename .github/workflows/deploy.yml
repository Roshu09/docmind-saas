name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build → Push ECR → Deploy EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/aifi

            # Pull latest code
            git pull origin main

            # Install any new dependencies
            cd apps/api && npm ci --omit=dev
            cd /home/ubuntu/aifi/apps/worker && npm ci --omit=dev

            # Build frontend
            cd /home/ubuntu/aifi/apps/web
            VITE_API_URL=https://docmind.space npm run build

            # Reload nginx for new frontend
            sudo systemctl reload nginx

            # Restart API and worker with zero downtime
            cd /home/ubuntu/aifi
            pm2 reload aifi-api --update-env
            pm2 reload aifi-worker --update-env

            # Health check
            sleep 5
            curl -f https://docmind.space/api/health || exit 1

            echo "✅ Deployment successful!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed for commit ${{ github.sha }}"
