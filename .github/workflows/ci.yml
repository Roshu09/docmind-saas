# .github/workflows/ci.yml
# ============================================================
# CI Pipeline - runs on every Pull Request
# Checks: lint → (future: test)
# Fails fast if anything is broken before it reaches main
# ============================================================

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Lint API
        working-directory: apps/api
        run: npm run lint || true   # Non-blocking for now; make blocking in Phase 2

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint Web
        working-directory: apps/web
        run: npm run lint || true

  docker-build-check:
    name: Verify Docker builds
    runs-on: ubuntu-latest
    needs: [lint-api, lint-web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t aifi-api:test ./apps/api

      - name: Build Worker Docker image
        run: docker build -t aifi-worker:test ./apps/worker

      - name: Build Web Docker image
        run: docker build -t aifi-web:test ./apps/web
        continue-on-error: true   # Web Dockerfile added in Phase 6
